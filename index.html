<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Night You Didn't See Coming</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05040a; font-family:'Georgia', serif; }
  #app { position:fixed; inset:0; width:100%; height:100%; overflow:hidden; }

  .layer { position:absolute; inset:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .6s ease; }
  .layer.active { opacity:1; pointer-events:auto; }
  .layer img.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .blur-out { filter: blur(10px) brightness(.7); transition: filter .35s ease; }

  /* ---------- TITLE SCREEN ---------- */
  #titleScreen { background:radial-gradient(ellipse at center, #1a1330 0%, #05040a 80%); flex-direction:column; gap:28px; z-index:50; }
  #titleScreen h1 {
    color:#f3e9ff; font-size:1.9rem; text-align:center; padding:0 30px; letter-spacing:1px;
    text-shadow: 0 0 18px rgba(200,170,255,0.8), 0 0 36px rgba(255,215,120,0.4);
    font-family: 'Palatino Linotype', Georgia, serif; font-style:italic;
  }
  #tapMusicBtn {
    padding:16px 34px; border-radius:40px; border:1px solid rgba(255,230,180,0.6);
    background:linear-gradient(135deg, rgba(180,140,255,0.25), rgba(255,210,140,0.2));
    color:#fff2da; font-size:1rem; letter-spacing:1px; box-shadow:0 0 25px rgba(190,150,255,0.45);
    animation:pulseGlow 2.4s infinite ease-in-out;
  }
  @keyframes pulseGlow { 0%,100%{box-shadow:0 0 15px rgba(190,150,255,0.35);} 50%{box-shadow:0 0 35px rgba(255,210,140,0.55);} }

  /* ---------- TRANSFORM SWIPE ---------- */
  #transformScreen { background:#0a0812; flex-direction:column; gap:14px; z-index:40; }
  #transformScreen p.hint { color:#d9c8ff; font-size:.85rem; letter-spacing:1px; opacity:.8; }
  .transformWrap { position:relative; width:78vw; max-width:340px; height:60vh; border-radius:18px; overflow:hidden; box-shadow:0 0 40px rgba(160,120,255,0.35); touch-action:none; }
  .transformWrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #imgAfter { clip-path: inset(0 0 0 100%); }
  #swipeHandle { position:absolute; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#fff2da,#c9a6ff); left:0%; box-shadow:0 0 12px #fff2da; }

  /* ---------- CAROUSEL ---------- */
  #carouselScreen { background:#0a0812; flex-direction:column; gap:16px; z-index:35; }
  .carouselTrack { position:relative; width:82vw; max-width:360px; height:60vh; }
  .carouselSlide { position:absolute; inset:0; opacity:0; filter:blur(14px); transition:opacity .5s ease, filter .5s ease; border-radius:16px; overflow:hidden; }
  .carouselSlide.current { opacity:1; filter:blur(0); z-index:2; }
  .carouselSlide.neighbor { opacity:1; filter:blur(10px); z-index:1; }
  .carouselSlide img { width:100%; height:100%; object-fit:cover; }
  .dots { display:flex; gap:8px; }
  .dots span { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.25); }
  .dots span.on { background:#f3d9a8; box-shadow:0 0 8px #f3d9a8; }
  #storyContinueBtn { margin-top:10px; padding:12px 26px; border-radius:30px; border:1px solid rgba(255,230,180,.5); background:rgba(255,255,255,0.06); color:#f3e9ff; font-size:.9rem; letter-spacing:1px; }

  /* ---------- STORY SCENES ---------- */
  #storyContainer { z-index:20; }
  .scene { position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity .5s ease; }
  .scene.active { opacity:1; pointer-events:auto; z-index:2; }
  .scene.dimmedNext, .scene.dimmedPrev { opacity:1; pointer-events:none; z-index:1; }
  .scene img.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .scene.blurring img.bg, .scene.blurring .cutout { filter: blur(9px) brightness(.75); }

  .cutout { position:absolute; object-fit:contain; filter:drop-shadow(0 10px 18px rgba(0,0,0,0.5)); }

  /* speech bubble style (reusable) */
  .speechBubble {
    position:absolute; max-width:70%; padding:10px 16px; border-radius:20px;
    background:linear-gradient(135deg, rgba(210,180,255,0.35), rgba(255,225,160,0.3));
    border:1px solid rgba(255,255,255,0.5); color:#fffaf0; font-size:.85rem; text-align:center;
    box-shadow:0 0 18px rgba(210,180,255,0.6), 0 0 30px rgba(255,225,160,0.3);
    backdrop-filter: blur(3px);
  }

  .sceneCaption {
    position:absolute; bottom:8%; left:0; right:0; text-align:center; color:#fdf3e2;
    font-size:1.1rem; font-style:italic; letter-spacing:.5px;
    text-shadow:0 0 14px rgba(255,210,140,0.8), 0 2px 6px rgba(0,0,0,0.8);
  }

  /* selection UI (dress / stick) - centered on screen */
  .selectionRow {
    position:absolute; top:50%; left:0; right:0; transform:translateY(-50%);
    display:flex; justify-content:center; align-items:center; gap:14px; z-index:10;
  }
  .selectionCard {
    width:24vw; max-width:110px; height:32vw; max-height:145px; border-radius:16px; overflow:hidden;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 0 18px rgba(200,170,255,0.5); backdrop-filter: blur(6px);
  }
  .selectionCard img { width:100%; height:100%; object-fit:contain; padding:6px; }

  /* background blur while a reveal/selection is active */
  .bgBlurred { filter: blur(13px) brightness(.65); }

  /* slow pop-up reveal for chosen character */
  @keyframes popInReveal {
    0%   { opacity:0; transform:translate(-50%,-42%) scale(.55); }
    70%  { opacity:1; }
    100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }
  .popInReveal {
    position:absolute; left:50%; top:52%; width:40%;
    animation: popInReveal 1.8s cubic-bezier(.2,.8,.3,1) forwards;
  }

  /* swipe arrows hint */
  .swipeHint { position:absolute; top:6%; left:0; right:0; text-align:center; color:rgba(255,255,255,0.55); font-size:.75rem; letter-spacing:2px; text-transform:uppercase; }

  /* fairy animation - small, near girl's head, loop until swiped */
  .fairy { position:absolute; width:9vw; max-width:46px; animation-fill-mode:forwards; }
  @keyframes fairyInLeft { 0%{ transform:translate(-55vw,18vh) scale(.6); opacity:0;} 70%{ transform:translate(0,0) scale(1); opacity:1;} 100%{ transform:translate(0,0) scale(1); opacity:1;} }
  @keyframes fairyInRight { 0%{ transform:translate(55vw,18vh) scale(.6); opacity:0;} 70%{ transform:translate(0,0) scale(1); opacity:1;} 100%{ transform:translate(0,0) scale(1); opacity:1;} }
  .fairy.left { animation: fairyInLeft 2.6s ease-out infinite alternate; }
  .fairy.right { animation: fairyInRight 2.6s ease-out infinite alternate; }

  /* fairies vanish with a soft poof (scale up + fade) when the crown scene begins */
  @keyframes fairyPoof {
    0%   { opacity:1; transform:scale(1); }
    40%  { opacity:1; transform:scale(1.25); }
    100% { opacity:0; transform:scale(1.6); }
  }
  .fairyPoof { animation: fairyPoof 1s ease-in forwards; }

  /* crown appears where the fairies met, then slides down and settles onto the girl's head */
  @keyframes crownSlide {
    0%   { opacity:0; left:50%; top:30%; width:14%; transform:translate(-50%,-50%) scale(.4); }
    35%  { opacity:1; left:50%; top:30%; width:16%; transform:translate(-50%,-50%) scale(1); }
    100% { opacity:1; left:47%; top:20%; width:16%; transform:translate(-50%,-50%) scale(1); }
  }
  .crownSlide { position:absolute; animation: crownSlide 1.8s cubic-bezier(.3,.6,.3,1) forwards; animation-delay:.5s; opacity:0; }

  /* deer walks in from the left edge and settles beside the girl */
  @keyframes deerWalkIn {
    0%   { left:-20%; transform:scaleX(1); }
    100% { left:44%;  transform:scaleX(1); }
  }
  .deerWalkIn { position:absolute; animation: deerWalkIn 2.2s ease-out forwards; }

  /* shiny/glow pulse for the final dress+stick combo cutout */
  @keyframes shinyPulse {
    0%,100% { filter: drop-shadow(0 10px 18px rgba(0,0,0,0.5)) drop-shadow(0 0 8px rgba(255,235,180,0.35)); }
    50%     { filter: drop-shadow(0 10px 18px rgba(0,0,0,0.5)) drop-shadow(0 0 26px rgba(255,235,180,0.75)); }
  }
  .shinyCutout { animation: shinyPulse 2.6s ease-in-out infinite; }

  /* glass-style caption panel for the final scene */
  .captionGlass {
    position:absolute; bottom:5%; left:8%; right:8%; text-align:center;
    padding:14px 18px; border-radius:18px; color:#fffaf0;
    font-size:1.05rem; font-style:italic; letter-spacing:.3px;
    background:linear-gradient(135deg, rgba(210,180,255,0.22), rgba(255,225,160,0.18));
    border:1px solid rgba(255,255,255,0.45);
    box-shadow:0 0 20px rgba(210,180,255,0.4), 0 0 34px rgba(255,225,160,0.25);
    backdrop-filter: blur(6px);
  }

  /* crown emerge (kept for compatibility, unused directly now) */
  @keyframes crownEmerge { 0%{ opacity:0; transform:translateY(30px) scale(.5);} 100%{ opacity:1; transform:translateY(0) scale(1);} }
  .crownEmerge { animation: crownEmerge 1.6s ease forwards; }

  /* car loop drive: starts small (far/near start point), grows bigger as it approaches the curve, mirrors at the turn, loops back */
  @keyframes driveLoop {
    0%   { left:6%;  bottom:5%;  width:13vw; transform: scaleX(1); }
    45%  { left:52%; bottom:32%; width:30vw; transform: scaleX(1); }
    50%  { left:58%; bottom:36%; width:32vw; transform: scaleX(-1); }
    95%  { left:10%; bottom:7%;  width:14vw; transform: scaleX(-1); }
    100% { left:6%;  bottom:5%;  width:13vw; transform: scaleX(1); }
  }
  .driveCar { position:absolute; animation: driveLoop 6s linear infinite; }

  /* flying scene */
  @keyframes flyUp {
    0% { transform: translateY(40vh) scale(.7); opacity:0; }
    30% { opacity:1; }
    100% { transform: translateY(-8vh) scale(1.1); opacity:1; }
  }
  .flyUpAnim { animation: flyUp 4s ease-out forwards; }

  audio#bgMusic { display:none; }
</style>
</head>
<body>
<div id="app">

  <!-- TITLE SCREEN -->
  <div class="layer active" id="titleScreen">
    <h1>The Night You Didn't See Coming</h1>
    <button id="tapMusicBtn">✦ Tap to Begin ✦</button>
  </div>

  <!-- TRANSFORM SWIPE -->
  <div class="layer" id="transformScreen">
    <p class="hint">Swipe to transform into cartoon pic</p>
    <div class="transformWrap" id="transformWrap">
      <img src="real photo.jpg" id="imgBefore" alt="">
      <img src="cartoon girl.png" id="imgAfter" alt="">
      <div id="swipeHandle"></div>
    </div>
    <button id="toCarouselBtn" style="margin-top:10px;padding:10px 24px;border-radius:24px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff;">Continue</button>
  </div>

  <!-- CAROUSEL -->
  <div class="layer" id="carouselScreen">
    <p class="hint">Story continues</p>
    <div class="carouselTrack" id="carouselTrack"></div>
    <div class="dots" id="carouselDots"></div>
    <button id="storyContinueBtn">Begin the Journey</button>
  </div>

  <!-- STORY SCENES -->
  <div class="layer" id="storyContainer"></div>

  <audio id="bgMusic" loop>
    <source src="bg music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
/* ============ IMAGE PRELOAD (for smooth swipes) ============ */
const allImagePaths = new Set([
  'Real photo.jpg','cartoon girl.png',
  'girl in bed calm.png','girl in bed sees boy at window.png','girl running to door.png','boy jumping excited.png',
  'City building.png','coastal road.png','jungle road.png','full moon.png','Lake  forest.png','fireflies.png','Cloudy moonlit sky.png','deer scene.png',
  'boy character.png','car empty.png','car with boy.png','baby deer face.png','flying crown.png','fairy purple.png','fairy white.png',
  'dress yellow.png','dress pink.png','dress blue.png',
  'stick silver.png','stick gold star.png','stick wood.png'
]);
['yellow','pink','blue'].forEach(c=>{
  allImagePaths.add(`girl ${c} dress.png`);
  allImagePaths.add(`girl ${c} butterflies.png`);
  ['silver stick','gold stick','wood stick'].forEach(sn=> allImagePaths.add(`${c} dress ${sn}.png`));
});
function preloadAllImages(){
  allImagePaths.forEach(src=>{ const im = new Image(); im.src = src; });
}

/* ============ AUDIO ============ */
const bgMusic = document.getElementById('bgMusic');
document.getElementById('tapMusicBtn').addEventListener('click', () => {
  bgMusic.volume = 0.7;
  bgMusic.play().catch(()=>{});
  preloadAllImages();
  goTo('transformScreen');
});

function goTo(id){
  document.querySelectorAll('.layer').forEach(l=>l.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============ TRANSFORM SWIPE ============ */
const wrap = document.getElementById('transformWrap');
const after = document.getElementById('imgAfter');
const handle = document.getElementById('swipeHandle');
let dragging = false;

function setSwipe(percent){
  percent = Math.max(0, Math.min(100, percent));
  after.style.clipPath = `inset(0 0 0 ${100-percent}%)`;
  handle.style.left = percent + '%';
}
wrap.addEventListener('touchstart', ()=>{ dragging = true; });
wrap.addEventListener('touchmove', (e)=>{
  if(!dragging) return;
  const rect = wrap.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  setSwipe((x/rect.width)*100);
});
wrap.addEventListener('touchend', ()=>{ dragging = false; });
// mouse fallback
wrap.addEventListener('mousedown', ()=>{ dragging = true; });
window.addEventListener('mouseup', ()=>{ dragging = false; });
window.addEventListener('mousemove', (e)=>{
  if(!dragging) return;
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  setSwipe((x/rect.width)*100);
});

document.getElementById('toCarouselBtn').addEventListener('click', ()=>{
  buildCarousel();
  goTo('carouselScreen');
});

/* ============ CAROUSEL (reunion 4 images) ============ */
const carouselImages = [
  'girl in bed calm.png',
  'girl in bed sees boy at window.png',
  'girl running to door.png',
  'boy jumping excited.png'
];
let carIndex = 0;
function buildCarousel(){
  const track = document.getElementById('carouselTrack');
  const dotsWrap = document.getElementById('carouselDots');
  track.innerHTML = '';
  dotsWrap.innerHTML = '';
  carouselImages.forEach((src,i)=>{
    const div = document.createElement('div');
    div.className = 'carouselSlide' + (i===0?' current':'');
    div.innerHTML = `<img src="${src}" alt="">`;
    track.appendChild(div);
    const dot = document.createElement('span');
    if(i===0) dot.className='on';
    dotsWrap.appendChild(dot);
  });
  let startX = null;
  track.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; });
  track.addEventListener('touchend', e=>{
    if(startX===null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(dx < -40 && carIndex < carouselImages.length-1){ carIndex++; updateCarousel(); }
    else if(dx > 40 && carIndex > 0){ carIndex--; updateCarousel(); }
    startX = null;
  });
}
function updateCarousel(){
  const slides = document.querySelectorAll('.carouselSlide');
  slides.forEach((s,i)=>{
    s.classList.remove('current','neighbor');
    if(i===carIndex) s.classList.add('current');
    else s.classList.add('neighbor');
  });
  document.querySelectorAll('.dots span').forEach((d,i)=>{
    d.classList.toggle('on', i===carIndex);
  });
}

document.getElementById('storyContinueBtn').addEventListener('click', ()=>{
  goTo('storyContainer');
  renderScene(0);
});

/* ============ STORY STATE ============ */
let selectedDress = null;   // 'yellow' | 'pink' | 'blue'
let selectedStick = null;   // 'silver' | 'gold star' | 'wood'
let currentScene = 0;

function getComboImage(){
  if(!selectedDress || !selectedStick) return null;
  const stickName = selectedStick === 'gold star' ? 'gold stick' : (selectedStick === 'silver' ? 'silver stick' : 'wood stick');
  return `${selectedDress} dress ${stickName}.png`;
}

/* ============ SCENES DEFINITION ============ */
// each scene: bg image + array of cutouts (positioned) + optional caption + optional type (selection screens)
const scenes = [
  { // 0: girl alone near building/door, boy + car together bottom-left (city night) - horizontal swipe (matches intro flow)
    bg:'City building.png',
    swipeAxis:'horizontal',
    cutouts:[
      {src:'cartoon girl.png', style:'left:38%; bottom:6%; width:24%;'},
      {src:'car empty.png', style:'left:4%; bottom:4%; width:18%;'},
      {src:'boy character.png', style:'left:8%; bottom:5%; width:16%;'}
    ]
  },
  { // 1: coastal road driving loop - from here on, vertical swipe
    bg:'coastal road.png',
    swipeAxis:'vertical',
    cutouts:[
      {src:'car with boy.png', class:'driveCar', style:''}
    ]
  },
  { // 2: jungle road driving loop
    bg:'jungle road.png',
    swipeAxis:'vertical',
    cutouts:[
      {src:'car with boy.png', class:'driveCar', style:''}
    ]
  },
  { // 3: full moon (static theme)
    bg:'full moon.png',
    swipeAxis:'vertical',
    cutouts:[]
  },
  { // 4: lake forest with girl, boy, car on sand
    bg:'Lake  forest.png',
    swipeAxis:'vertical',
    cutouts:[
      {src:'cartoon girl.png', style:'left:30%; bottom:10%; width:20%;'},
      {src:'boy character.png', style:'left:50%; bottom:9%; width:16%;'},
      {src:'car empty.png', style:'left:64%; bottom:7%; width:14%;'}
    ]
  },
  { // 5: fireflies (static theme)
    bg:'fireflies.png',
    swipeAxis:'vertical',
    cutouts:[]
  },
  { // 6: dress selection screen
    bg:'fireflies.png',
    swipeAxis:'vertical',
    dressSelection:true,
    cutouts:[]
  },
  { // 7: after dress choice -> butterfly version (next scene, blurred bg, slow pop-in)
    bg:'fireflies.png',
    swipeAxis:'vertical',
    dynamic:'butterflies',
    blurBg:true
  },
  { // 8: deer scene - girl bigger/dominant, small deer walks in from left
    bg:'deer scene.png',
    swipeAxis:'vertical',
    dynamic:'normalDressWithDeer'
  },
  { // 9: fairies flying in near girl's head, small size, loop until swipe
    bg:'deer scene.png',
    swipeAxis:'vertical',
    dynamic:'fairies'
  },
  { // 10: fairies poof out, crown slides onto head
    bg:'deer scene.png',
    swipeAxis:'vertical',
    dynamic:'crown'
  },
  { // 11: stick selection screen
    bg:'fireflies.png',
    swipeAxis:'vertical',
    stickSelection:true
  },
  { // 12: after stick choice -> combo cutout (next scene, blurred bg, slow pop-in, shiny)
    bg:'fireflies.png',
    swipeAxis:'vertical',
    dynamic:'dressStickCombo',
    blurBg:true
  },
  { // 13: cloudy moonlit sky - flying up, bigger, uses dress+stick combo
    bg:'Cloudy moonlit sky.png',
    swipeAxis:'vertical',
    dynamic:'flyUp'
  },
  { // 14: final deer scene with caption - combo cutout, bigger, shiny, glass caption below
    bg:'deer scene.png',
    swipeAxis:'vertical',
    dynamic:'finalCombo',
    caption:"Thanks princess for giving life to this forest"
  }
];

const storyContainer = document.getElementById('storyContainer');

function renderScene(index){
  currentScene = index;
  storyContainer.innerHTML = '';
  const s = scenes[index];
  const div = document.createElement('div');
  div.className = 'scene active';
  div.id = 'scene-'+index;

  const bg = document.createElement('img');
  bg.className = 'bg' + (s.blurBg ? ' bgBlurred' : '');
  bg.src = s.bg;
  div.appendChild(bg);

  // static cutouts
  (s.cutouts||[]).forEach(c=>{
    const img = document.createElement('img');
    img.className = 'cutout ' + (c.class||'');
    img.src = c.src;
    img.style.cssText += c.style;
    div.appendChild(img);
  });

  // dynamic content
  if(s.dynamic === 'butterflies' && selectedDress){
    const img = document.createElement('img');
    img.className = 'popInReveal';
    img.src = `girl ${selectedDress} butterflies.png`;
    div.appendChild(img);
  }
  if(s.dynamic === 'normalDressWithDeer' && selectedDress){
    // girl bigger/dominant, deer small and walks in from left
    addCutout(div, `girl ${selectedDress} dress.png`, 'left:26%; bottom:8%; width:44%; z-index:3;');
    const deer = document.createElement('img');
    deer.className = 'cutout deerWalkIn';
    deer.src = 'baby deer face.png';
    deer.style.cssText = 'bottom:6%; width:16%; z-index:2;';
    div.appendChild(deer);
  }
  if(s.dynamic === 'fairies' && selectedDress){
    addCutout(div, `girl ${selectedDress} dress.png`, 'left:26%; bottom:8%; width:44%;');
    const f1 = document.createElement('img');
    f1.className = 'fairy left'; f1.src = 'fairy purple.png';
    f1.style.cssText = 'top:32%; left:44%;';
    div.appendChild(f1);
    const f2 = document.createElement('img');
    f2.className = 'fairy right'; f2.src = 'fairy white.png';
    f2.style.cssText = 'top:32%; left:54%;';
    div.appendChild(f2);
  }
  if(s.dynamic === 'crown' && selectedDress){
    addCutout(div, `girl ${selectedDress} dress.png`, 'left:26%; bottom:8%; width:44%;');
    const f1 = document.createElement('img');
    f1.className = 'fairy fairyPoof'; f1.src = 'fairy purple.png';
    f1.style.cssText = 'top:32%; left:44%;';
    div.appendChild(f1);
    const f2 = document.createElement('img');
    f2.className = 'fairy fairyPoof'; f2.src = 'fairy white.png';
    f2.style.cssText = 'top:32%; left:54%; animation-delay:.15s;';
    div.appendChild(f2);
    const crown = document.createElement('img');
    crown.className = 'cutout crownSlide';
    crown.src = 'flying crown.png';
    div.appendChild(crown);
  }
  if(s.dynamic === 'dressStickCombo' && selectedDress && selectedStick){
    const img = document.createElement('img');
    img.className = 'popInReveal shinyCutout';
    img.src = getComboImage();
    div.appendChild(img);
  }
  if(s.dynamic === 'flyUp' && selectedDress && selectedStick){
    const el = document.createElement('img');
    el.className = 'cutout flyUpAnim shinyCutout';
    el.src = getComboImage();
    el.style.cssText = 'left:26%; bottom:15%; width:46%;';
    div.appendChild(el);
  }
  if(s.dynamic === 'finalCombo' && selectedDress && selectedStick){
    const img = document.createElement('img');
    img.className = 'cutout shinyCutout';
    img.src = getComboImage();
    img.style.cssText = 'left:22%; bottom:14%; width:56%;';
    div.appendChild(img);
    const capWrap = document.createElement('div');
    capWrap.className = 'captionGlass';
    capWrap.textContent = s.caption;
    div.appendChild(capWrap);
  }
  if(s.caption && s.dynamic !== 'finalCombo'){
    const cap = document.createElement('div');
    cap.className = 'sceneCaption';
    cap.textContent = s.caption;
    div.appendChild(cap);
  }

  // selection UIs
  if(s.dressSelection){
    addSelectionRow(div, ['yellow','pink','blue'], (choice)=>{
      selectedDress = choice;
      nextScene();
    }, 'dress');
  }
  if(s.stickSelection){
    addSelectionRow(div, ['silver','gold star','wood'], (choice)=>{
      selectedStick = choice;
      nextScene();
    }, 'stick');
  }

  storyContainer.appendChild(div);

  // swipe navigation (only if no selection UI blocking on this scene)
  if(!s.dressSelection && !s.stickSelection){
    enableSwipeNav(div, s.swipeAxis || 'vertical');
  }
}

function addCutout(parent, src, style){
  const img = document.createElement('img');
  img.className = 'cutout';
  img.src = src;
  img.style.cssText += style;
  parent.appendChild(img);
}

function addSelectionRow(parent, options, onPick, type){
  const row = document.createElement('div');
  row.className = 'selectionRow';
  options.forEach(opt=>{
    const card = document.createElement('div');
    card.className = 'selectionCard';
    const imgName = type==='dress' ? `dress ${opt}.png` : `stick ${opt}.png`;
    card.innerHTML = `<img src="${imgName}" alt="">`;
    card.addEventListener('click', ()=> onPick(opt));
    row.appendChild(card);
  });
  parent.appendChild(row);
}

function enableSwipeNav(sceneEl, axis){
  let startX = null, startY = null;
  sceneEl.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; startY = e.touches[0].clientY; });
  sceneEl.addEventListener('touchend', e=>{
    if(startX===null) return;
    if(axis === 'vertical'){
      const dy = e.changedTouches[0].clientY - startY;
      if(dy < -50) nextScene();
      else if(dy > 50 && currentScene>0) renderScene(currentScene-1);
    } else {
      const dx = e.changedTouches[0].clientX - startX;
      if(dx < -50) nextScene();
      else if(dx > 50 && currentScene>0) renderScene(currentScene-1);
    }
    startX = null; startY = null;
  });
}

function nextScene(){
  if(currentScene < scenes.length-1){
    // brief blur transition
    const cur = document.getElementById('scene-'+currentScene);
    if(cur) cur.classList.add('blurring');
    setTimeout(()=>{ renderScene(currentScene+1); }, 300);
  }
}
</script>
