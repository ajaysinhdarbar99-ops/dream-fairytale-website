<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Night You Didn't See Coming</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05040a; font-family:'Georgia', serif; }
  #app { position:fixed; inset:0; width:100%; height:100%; overflow:hidden; }

  .layer { position:absolute; inset:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .6s ease; }
  .layer.active { opacity:1; pointer-events:auto; }
  .layer img.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .blur-out { filter: blur(10px) brightness(.7); transition: filter .35s ease; }

  /* ---------- TITLE SCREEN ---------- */
  #titleScreen { background:radial-gradient(ellipse at center, #1a1330 0%, #05040a 80%); flex-direction:column; gap:28px; z-index:50; }
  #titleScreen h1 {
    color:#f3e9ff; font-size:1.9rem; text-align:center; padding:0 30px; letter-spacing:1px;
    text-shadow: 0 0 18px rgba(200,170,255,0.8), 0 0 36px rgba(255,215,120,0.4);
    font-family: 'Palatino Linotype', Georgia, serif; font-style:italic;
  }
  #tapMusicBtn {
    padding:16px 34px; border-radius:40px; border:1px solid rgba(255,230,180,0.6);
    background:linear-gradient(135deg, rgba(180,140,255,0.25), rgba(255,210,140,0.2));
    color:#fff2da; font-size:1rem; letter-spacing:1px; box-shadow:0 0 25px rgba(190,150,255,0.45);
    animation:pulseGlow 2.4s infinite ease-in-out;
  }
  @keyframes pulseGlow { 0%,100%{box-shadow:0 0 15px rgba(190,150,255,0.35);} 50%{box-shadow:0 0 35px rgba(255,210,140,0.55);} }

  /* ---------- TRANSFORM SWIPE ---------- */
  #transformScreen { background:#0a0812; flex-direction:column; gap:14px; z-index:40; }
  #transformScreen p.hint { color:#d9c8ff; font-size:.85rem; letter-spacing:1px; opacity:.8; }
  .transformWrap { position:relative; width:78vw; max-width:340px; height:60vh; border-radius:18px; overflow:hidden; box-shadow:0 0 40px rgba(160,120,255,0.35); touch-action:none; }
  .transformWrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #imgAfter { clip-path: inset(0 0 0 100%); }
  #swipeHandle { position:absolute; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#fff2da,#c9a6ff); left:0%; box-shadow:0 0 12px #fff2da; }

  /* ---------- CAROUSEL ---------- */
  #carouselScreen { background:#0a0812; flex-direction:column; gap:16px; z-index:35; }
  .carouselTrack { position:relative; width:82vw; max-width:360px; height:60vh; }
  .carouselSlide { position:absolute; inset:0; opacity:0; filter:blur(14px); transition:opacity .5s ease, filter .5s ease; border-radius:16px; overflow:hidden; }
  .carouselSlide.current { opacity:1; filter:blur(0); z-index:2; }
  .carouselSlide.neighbor { opacity:1; filter:blur(10px); z-index:1; }
  .carouselSlide img { width:100%; height:100%; object-fit:cover; }
  .dots { display:flex; gap:8px; }
  .dots span { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.25); }
  .dots span.on { background:#f3d9a8; box-shadow:0 0 8px #f3d9a8; }
  #storyContinueBtn { margin-top:10px; padding:12px 26px; border-radius:30px; border:1px solid rgba(255,230,180,.5); background:rgba(255,255,255,0.06); color:#f3e9ff; font-size:.9rem; letter-spacing:1px; }

  /* ---------- STORY SCENES ---------- */
  #storyContainer { z-index:20; }
  .scene { position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity .5s ease; }
  .scene.active { opacity:1; pointer-events:auto; z-index:2; }
  .scene.dimmedNext, .scene.dimmedPrev { opacity:1; pointer-events:none; z-index:1; }
  .scene img.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .scene.blurring img.bg, .scene.blurring .cutout { filter: blur(9px) brightness(.75); }

  .cutout { position:absolute; object-fit:contain; filter:drop-shadow(0 10px 18px rgba(0,0,0,0.5)); }

  /* speech bubble style (reusable) */
  .speechBubble {
    position:absolute; max-width:70%; padding:10px 16px; border-radius:20px;
    background:linear-gradient(135deg, rgba(210,180,255,0.35), rgba(255,225,160,0.3));
    border:1px solid rgba(255,255,255,0.5); color:#fffaf0; font-size:.85rem; text-align:center;
    box-shadow:0 0 18px rgba(210,180,255,0.6), 0 0 30px rgba(255,225,160,0.3);
    backdrop-filter: blur(3px);
  }

  .sceneCaption {
    position:absolute; bottom:8%; left:0; right:0; text-align:center; color:#fdf3e2;
    font-size:1.1rem; font-style:italic; letter-spacing:.5px;
    text-shadow:0 0 14px rgba(255,210,140,0.8), 0 2px 6px rgba(0,0,0,0.8);
  }

  /* selection UI (dress / stick) */
  .selectionRow {
    position:absolute; bottom:8%; left:0; right:0; display:flex; justify-content:center; gap:10px; z-index:10;
  }
  .selectionCard {
    width:22vw; max-width:100px; height:30vw; max-height:135px; border-radius:16px; overflow:hidden;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 0 18px rgba(200,170,255,0.5); backdrop-filter: blur(6px);
  }
  .selectionCard img { width:100%; height:100%; object-fit:contain; padding:6px; }

  /* swipe arrows hint */
  .swipeHint { position:absolute; top:6%; left:0; right:0; text-align:center; color:rgba(255,255,255,0.55); font-size:.75rem; letter-spacing:2px; text-transform:uppercase; }

  /* fairy animation */
  .fairy { position:absolute; width:14vw; max-width:70px; animation-fill-mode:forwards; }
  @keyframes fairyInLeft { 0%{ transform:translate(-60vw,20vh) scale(.6); opacity:0;} 70%{ transform:translate(-4vw,-2vh) scale(1); opacity:1;} 100%{ transform:translate(-4vw,-2vh) scale(1); opacity:1;} }
  @keyframes fairyInRight { 0%{ transform:translate(60vw,20vh) scale(.6); opacity:0;} 70%{ transform:translate(4vw,-2vh) scale(1); opacity:1;} 100%{ transform:translate(4vw,-2vh) scale(1); opacity:1;} }
  .fairy.left { animation: fairyInLeft 2.6s ease-out infinite alternate; }
  .fairy.right { animation: fairyInRight 2.6s ease-out infinite alternate; }

  /* crown emerge */
  @keyframes crownEmerge { 0%{ opacity:0; transform:translateY(30px) scale(.5);} 100%{ opacity:1; transform:translateY(0) scale(1);} }
  .crownEmerge { animation: crownEmerge 1.6s ease forwards; }

  /* car loop drive */
  @keyframes driveLoop {
    0%   { transform: translateX(-30%) scaleX(1); }
    45%  { transform: translateX(20%) scaleX(1); }
    50%  { transform: translateX(20%) scaleX(-1); }
    95%  { transform: translateX(-30%) scaleX(-1); }
    100% { transform: translateX(-30%) scaleX(1); }
  }
  .driveCar { animation: driveLoop 9s linear infinite; }

  /* flying scene */
  @keyframes flyUp {
    0% { transform: translateY(40vh) scale(.7); opacity:0; }
    30% { opacity:1; }
    100% { transform: translateY(-10vh) scale(1); opacity:1; }
  }
  .flyUpAnim { animation: flyUp 4s ease-out forwards; }

  audio#bgMusic { display:none; }
</style>
</head>
<body>
<div id="app">

  <!-- TITLE SCREEN -->
  <div class="layer active" id="titleScreen">
    <h1>The Night You Didn't See Coming</h1>
    <button id="tapMusicBtn">✦ Tap to Begin ✦</button>
  </div>

  <!-- TRANSFORM SWIPE -->
  <div class="layer" id="transformScreen">
    <p class="hint">Swipe to transform into cartoon pic</p>
    <div class="transformWrap" id="transformWrap">
      <img src="real photo.jpg" id="imgBefore" alt="">
      <img src="cartoon girl.png" id="imgAfter" alt="">
      <div id="swipeHandle"></div>
    </div>
    <button id="toCarouselBtn" style="margin-top:10px;padding:10px 24px;border-radius:24px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff;">Continue</button>
  </div>

  <!-- CAROUSEL -->
  <div class="layer" id="carouselScreen">
    <p class="hint">Story continues</p>
    <div class="carouselTrack" id="carouselTrack"></div>
    <div class="dots" id="carouselDots"></div>
    <button id="storyContinueBtn">Begin the Journey</button>
  </div>

  <!-- STORY SCENES -->
  <div class="layer" id="storyContainer"></div>

  <audio id="bgMusic" loop>
    <source src="bg music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
/* ============ AUDIO ============ */
const bgMusic = document.getElementById('bgMusic');
document.getElementById('tapMusicBtn').addEventListener('click', () => {
  bgMusic.volume = 0.7;
  bgMusic.play().catch(()=>{});
  goTo('transformScreen');
});

function goTo(id){
  document.querySelectorAll('.layer').forEach(l=>l.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============ TRANSFORM SWIPE ============ */
const wrap = document.getElementById('transformWrap');
const after = document.getElementById('imgAfter');
const handle = document.getElementById('swipeHandle');
let dragging = false;

function setSwipe(percent){
  percent = Math.max(0, Math.min(100, percent));
  after.style.clipPath = `inset(0 0 0 ${100-percent}%)`;
  handle.style.left = percent + '%';
}
wrap.addEventListener('touchstart', ()=>{ dragging = true; });
wrap.addEventListener('touchmove', (e)=>{
  if(!dragging) return;
  const rect = wrap.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  setSwipe((x/rect.width)*100);
});
wrap.addEventListener('touchend', ()=>{ dragging = false; });
// mouse fallback
wrap.addEventListener('mousedown', ()=>{ dragging = true; });
window.addEventListener('mouseup', ()=>{ dragging = false; });
window.addEventListener('mousemove', (e)=>{
  if(!dragging) return;
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  setSwipe((x/rect.width)*100);
});

document.getElementById('toCarouselBtn').addEventListener('click', ()=>{
  buildCarousel();
  goTo('carouselScreen');
});

/* ============ CAROUSEL (reunion 4 images) ============ */
const carouselImages = [
  'girl in bed calm.png',
  'girl in bed sees boy at window.png',
  'girl running to door.png',
  'boy jumping excited.png'
];
let carIndex = 0;
function buildCarousel(){
  const track = document.getElementById('carouselTrack');
  const dotsWrap = document.getElementById('carouselDots');
  track.innerHTML = '';
  dotsWrap.innerHTML = '';
  carouselImages.forEach((src,i)=>{
    const div = document.createElement('div');
    div.className = 'carouselSlide' + (i===0?' current':'');
    div.innerHTML = `<img src="${src}" alt="">`;
    track.appendChild(div);
    const dot = document.createElement('span');
    if(i===0) dot.className='on';
    dotsWrap.appendChild(dot);
  });
  let startX = null;
  track.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; });
  track.addEventListener('touchend', e=>{
    if(startX===null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(dx < -40 && carIndex < carouselImages.length-1){ carIndex++; updateCarousel(); }
    else if(dx > 40 && carIndex > 0){ carIndex--; updateCarousel(); }
    startX = null;
  });
}
function updateCarousel(){
  const slides = document.querySelectorAll('.carouselSlide');
  slides.forEach((s,i)=>{
    s.classList.remove('current','neighbor');
    if(i===carIndex) s.classList.add('current');
    else s.classList.add('neighbor');
  });
  document.querySelectorAll('.dots span').forEach((d,i)=>{
    d.classList.toggle('on', i===carIndex);
  });
}

document.getElementById('storyContinueBtn').addEventListener('click', ()=>{
  goTo('storyContainer');
  renderScene(0);
});

/* ============ STORY STATE ============ */
let selectedDress = null;   // 'yellow' | 'pink' | 'blue'
let selectedStick = null;   // 'silver' | 'gold star' | 'wood'
let currentScene = 0;

/* ============ SCENES DEFINITION ============ */
// each scene: bg image + array of cutouts (positioned) + optional caption + optional type (selection screens)
const scenes = [
  { // 0: girl + car + boy at door (city night)
    bg:'City building.png',
    cutouts:[
      {src:'girl running to door.png', style:'left:8%; bottom:6%; width:22%;'},
      {src:'car empty.png', style:'left:38%; bottom:4%; width:26%;'},
      {src:'boy character.png', style:'left:66%; bottom:6%; width:22%;'}
    ]
  },
  { // 1: coastal road driving loop
    bg:'coastal road.png',
    cutouts:[
      {src:'car with boy.png', class:'driveCar', style:'left:35%; bottom:20%; width:30%;'}
    ]
  },
  { // 2: jungle road driving loop
    bg:'jungle road.png',
    cutouts:[
      {src:'car with boy.png', class:'driveCar', style:'left:35%; bottom:20%; width:30%;'}
    ]
  },
  { // 3: full moon (static theme)
    bg:'full moon.png',
    cutouts:[]
  },
  { // 4: lake forest with girl, boy, car on sand
    bg:'Lake forest.png',
    cutouts:[
      {src:'girl running to door.png', style:'left:30%; bottom:10%; width:20%;'},
      {src:'boy character.png', style:'left:50%; bottom:9%; width:16%;'},
      {src:'car empty.png', style:'left:64%; bottom:7%; width:14%;'}
    ]
  },
  { // 5: fireflies (static theme)
    bg:'fireflies.png',
    cutouts:[]
  },
  { // 6: dress selection screen (fireflies bg blurred + lake layering blurred underneath idea simplified to fireflies + selection)
    bg:'fireflies.png',
    dressSelection:true,
    cutouts:[]
  },
  { // 7: after dress choice -> butterfly version
    bg:'fireflies.png',
    dynamic:'butterflies'
  },
  { // 8: deer scene with normal dress + baby deer
    bg:'deer scene.png',
    dynamic:'normalDressWithDeer'
  },
  { // 9: fairies flying to girl's head
    bg:'deer scene.png',
    dynamic:'fairies'
  },
  { // 10: crown emerges
    bg:'deer scene.png',
    dynamic:'crown'
  },
  { // 11: stick selection screen
    bg:'fireflies.png',
    stickSelection:true
  },
  { // 12: after stick choice -> combo cutout
    bg:'fireflies.png',
    dynamic:'dressStickCombo'
  },
  { // 13: cloudy moonlit sky - flying up
    bg:'Cloudy moonlit sky.png',
    dynamic:'flyUp'
  },
  { // 14: final deer scene with caption
    bg:'deer scene.png',
    dynamic:'finalCombo',
    caption:"Thanks princess for giving life to this forest"
  }
];

const storyContainer = document.getElementById('storyContainer');

function renderScene(index){
  currentScene = index;
  storyContainer.innerHTML = '';
  const s = scenes[index];
  const div = document.createElement('div');
  div.className = 'scene active';
  div.id = 'scene-'+index;

  const bg = document.createElement('img');
  bg.className = 'bg';
  bg.src = s.bg;
  div.appendChild(bg);

  // static cutouts
  (s.cutouts||[]).forEach(c=>{
    const img = document.createElement('img');
    img.className = 'cutout ' + (c.class||'');
    img.src = c.src;
    img.style.cssText += c.style;
    div.appendChild(img);
  });

  // dynamic content
  if(s.dynamic === 'butterflies' && selectedDress){
    addCutout(div, `girl ${selectedDress} butterflies.png`, 'left:28%; bottom:6%; width:44%;');
  }
  if(s.dynamic === 'normalDressWithDeer' && selectedDress){
    addCutout(div, `girl ${selectedDress} dress.png`, 'left:24%; bottom:8%; width:34%;');
    addCutout(div, 'baby deer face.png', 'left:60%; bottom:6%; width:24%;');
  }
  if(s.dynamic === 'fairies' && selectedDress){
    addCutout(div, `girl ${selectedDress} dress.png`, 'left:30%; bottom:8%; width:36%;');
    const f1 = document.createElement('img');
    f1.className = 'fairy left'; f1.src = 'fairy purple.png';
    f1.style.cssText = 'top:18%; left:46%;';
    div.appendChild(f1);
    const f2 = document.createElement('img');
    f2.className = 'fairy right'; f2.src = 'fairy white.png';
    f2.style.cssText = 'top:18%; left:52%;';
    div.appendChild(f2);
  }
  if(s.dynamic === 'crown' && selectedDress){
    addCutout(div, `girl ${selectedDress} dress.png`, 'left:30%; bottom:8%; width:36%;');
    const crown = document.createElement('img');
    crown.className = 'cutout crownEmerge';
    crown.src = 'flying crown.png';
    crown.style.cssText = 'left:41%; top:16%; width:18%;';
    div.appendChild(crown);
  }
  if(s.dynamic === 'dressStickCombo' && selectedDress && selectedStick){
    const stickName = selectedStick === 'gold star' ? 'gold stick' : (selectedStick === 'silver' ? 'silver stick' : 'wood stick');
    addCutout(div, `${selectedDress} dress ${stickName}.png`, 'left:26%; bottom:6%; width:40%;');
  }
  if(s.dynamic === 'flyUp' && selectedDress){
    const el = document.createElement('img');
    el.className = 'cutout flyUpAnim';
    el.src = `girl ${selectedDress} dress.png`;
    el.style.cssText = 'left:32%; bottom:20%; width:32%;';
    div.appendChild(el);
  }
  if(s.dynamic === 'finalCombo' && selectedDress){
    addCutout(div, `girl ${selectedDress} dress.png`, 'left:30%; bottom:14%; width:36%;');
    const cap = document.createElement('div');
    cap.className = 'sceneCaption';
    cap.textContent = s.caption;
    div.appendChild(cap);
  }
  if(s.caption && s.dynamic !== 'finalCombo'){
    const cap = document.createElement('div');
    cap.className = 'sceneCaption';
    cap.textContent = s.caption;
    div.appendChild(cap);
  }

  // selection UIs
  if(s.dressSelection){
    addSelectionRow(div, ['yellow','pink','blue'], (choice)=>{
      selectedDress = choice;
      nextScene();
    }, 'dress');
  }
  if(s.stickSelection){
    addSelectionRow(div, ['silver','gold star','wood'], (choice)=>{
      selectedStick = choice;
      nextScene();
    }, 'stick');
  }

  storyContainer.appendChild(div);

  // swipe navigation (only if no selection UI blocking on this scene)
  if(!s.dressSelection && !s.stickSelection){
    enableSwipeNav(div);
  }
}

function addCutout(parent, src, style){
  const img = document.createElement('img');
  img.className = 'cutout';
  img.src = src;
  img.style.cssText += style;
  parent.appendChild(img);
}

function addSelectionRow(parent, options, onPick, type){
  const row = document.createElement('div');
  row.className = 'selectionRow';
  options.forEach(opt=>{
    const card = document.createElement('div');
    card.className = 'selectionCard';
    const imgName = type==='dress' ? `dress ${opt}.png` : `stick ${opt}.png`;
    card.innerHTML = `<img src="${imgName}" alt="">`;
    card.addEventListener('click', ()=> onPick(opt));
    row.appendChild(card);
  });
  parent.appendChild(row);
}

function enableSwipeNav(sceneEl){
  let startX = null;
  sceneEl.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; });
  sceneEl.addEventListener('touchend', e=>{
    if(startX===null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(dx < -50) nextScene();
    else if(dx > 50 && currentScene>0) renderScene(currentScene-1);
    startX = null;
  });
}

function nextScene(){
  if(currentScene < scenes.length-1){
    // brief blur transition
    const cur = document.getElementById('scene-'+currentScene);
    if(cur) cur.classList.add('blurring');
    setTimeout(()=>{ renderScene(currentScene+1); }, 300);
  }
}
</script>
</body>
</html>
